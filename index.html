ost sensitive credentials"],link:"#",isFlagship:!0,isAceProject:!0,typeAce:"Security • Cryptography",periodAce:"2023"},"external-partner-integrations":{id:"external-partner-integrations",title:"External Partner Integrations",tech:[".NET","REST APIs","SOAP","OAuth2","HMAC"],summary:"Integrated major payment partners including Mastercard, HBL, and PNB with robust, secure payment flows.",description:"Delivered bank partner integrations engineering resilient adapters, retries, idempotency, and observability. Extensive experience consuming external services via well-typed client libraries and SLA-aware timeouts.",isAceProject:!0,typeAce:"Integrations • API",periodAce:"2023 — Present",partners:["Mastercard","HBL (Habib Bank Limited)","PNB (Punjab National Bank, India)"],impact:["Highly praised by Mastercard team for implementation quality","Robust error handling and retry mechanisms","Complete observability and monitoring"]},"real-time-infrastructure":{id:"real-time-infrastructure",title:"Real-time Infrastructure",tech:["SignalR",".NET","WebSockets","Redis"],summary:"Established SignalR infrastructure for notifications and real-time features across ERP.",description:"Built real-time communication layer including connection lifecycle, delivery semantics, and scale considerations. Applied RPC concepts within event-driven systems.",isAceProject:!0,typeAce:"Infrastructure • SignalR",periodAce:"2024",impact:["Live notifications across all ERP modules","Reliable delivery with fallback mechanisms","Scalable architecture for future growth"]},"background-jobs-framework":{id:"background-jobs-framework",title:"Background Jobs Framework",tech:[".NET 10","Background Services","Channels","PostgreSQL"],summary:"Unbreakable background jobs management system adopted across multiple projects to solve a long-standing infrastructure gap.",description:"First introduced in EMS as a personal engineering necessity, this framework proved so robust and reliable at launch that other teams — facing ngine",tech:["Python 3.14","ReportLab","OpenPyXL","Pandas","FastAPI"],summary:"Python-based microservice that replaced years of fragmented, per-project reporting across ACE with a single, zero-overhead solution.",description:"Every project at ACE handled reporting independently — brittle, unreliable, non-customizable. I proposed and solely built a microservice reporting engine in Python 3.14, leveraging its rich library ecosystem. The design philosophy: expose underlying library APIs directly with zero wrapper overhead. The need for dynamic, visual query construction during this project also gave birth to SchemaFlow — now an open-source standalone tool.",descriptionAce:"ACE had a years-long, company-wide reporting problem: every project — EMS, ERP, Laravel-based services, and more — handled reporting independently, resulting in brittle, unreliable, and non-customizable implementations. I proposed a microservice-based architecture with Python 3.14 as the primary reporting engine, leveraging its rich library ecosystem for flexible report generation and data presentation. I solely developed the engine (since nobody had specialization in polyglot application development), keeping the implementation minimal by design — exposing the underlying library APIs directly, requiring zero overhead for maintenance or custom development. The engine is now integrated across EMS, ERP, and multiple Laravel-based projects, becoming ACE's internal industry standard for reporting. The need for dynamic, visual query construction during this project also gave birth to SchemaFlow — now an open-source standalone tool.",category:"Microservice • Polyglot",challenge:"Years of fragmented reporting across 5+ services and projects — each with its own brittle, badly designed, rigid implementation. Inconsistent outputs, unmaintainable code, and no customization support.",approach:"Designed a language-agnostic microservice consumed via REST. Chose Python 3.14 for its unmatched library ecosystem (ReportLab, OpenPyXL, Pandas, Jinja2). Kept the implementation minimal — the API surface mirrors the underlying libraries directly, requiring zero maintenance overhead for new report types. Polyglot integration ensures .NET, Angular, and Laravel projects consume it seamlessly.",impact:["Solved an years-long company-wide problem","Replaced 5+ independent brittle implementations","Became ACE's internal standard for reporting","Zero maintenance overhead via direct API design","Demonstrated enterprise-grade polyglot engineering"],link:"#",isFlagship:!0,isAceProject:!0,featured:!0,typeAce:"Microservice • Polyglot",periodAce:"2025 — Present",architecturalHighlights:["Microservice architecture — language-agnostic integration via HTTP/REST","Python 3.14 core — leveraging rich library ecosystem (ReportLab, OpenPyXL, Pandas, Jinja2)","Zero-overhead API design: exposes underlying library capabilities directly, no wrapper abstraction tax","Minimal implementation philosophy — maximum flexibility with minimum maintenance surface","Unified report templates with runtime-configurable customization","Data export in multiple formats: PDF, Excel, CSV, with consistent styling","Polyglot integration — seamlessly consumed by .NET, Angular, and Laravel projects","Sole developer in a polyglot-first engineering approach"],techAce:["Python 3.14","ReportLab","OpenPyXL","Pandas","FastAPI","Microservices"],impactAce:["Solved an years-long, company-wide reporting fragmentation problem","Replaced independent, brittle implementations across 5+ projects","Became ACE's internal standard for all reporting needs","Zero maintenance overhead due to direct API pass-through design","Demonstrated polyglot software engineering at enterprise scale"]},"uwb-sim":{id:"uwb-sim",title:"UWB Indoor Positioning Simulation",tech:["C# 13",".NET 9","Python","NumPy","SciPy","WPF"],summary:"Sophisticated simulation engine enabling UWB deployment planning without physical hardware.",description:"Client needed to validate UWB anchor placements before expensive physical installation. My deep interest in [ac]physics[/ac] — signal propagation, electromagnetic attenuation, and computational geometry — made this a uniquely natural fit. Built a hybrid (polyglot) .NET/Python system modeling signal behavior with material-specific precision.",category:"Simulation • Research",challenge:"Deploying UWB anchors requires expensive physical testing. Mistakes in placement are costly to fix. The client needed virtual validation before drilling holes.",approach:"Built a hybrid simulation engine: .NET for UI, core logic, and geometric calculations; Python (NumPy/SciPy) for signal propagation modeling and heatmap generation. Implemented material-specific attenuation for walls, glass, and obstacles.",impact:["Reduced deployment costs by approximately 60%","Compressed timeline from months to days","Simulation accuracy within 5% of physical tests","Exceptional client praise for attention to detail"],link:"#",isFlagship:!0,featured:!0},"mr-crypt":{id:"mr-crypt",title:"mr_crypt",tech:["C++23","OpenSSL 3.0+","Template Metaprogramming"],summary:"[ac]Revolutionary[/ac] range-like syntax for C++ cryptography reducing implementation time by [hi]10x[/hi].",description:"OpenSSL's C-API is verbose and error-prone. Created a wrapper using [ac]C++23 ranges[/ac] and [hi]template metaprogramming[/hi] for type-safe, fluent cryptographic operations.",category:"Open Source • Library",challenge:"OpenSSL's C-API requires extensive boilerplate, manual memory management, and is difficult to use safely in modern C++ projects.",approach:"Leveraged C++23 ranges and concepts to create a fluent, type-safe API. Template metaprogramming ensures compile-time safety. Seamless OpenSSL 3.0+ integration.",impact:["10x reduction in implementation boilerplate","Significant improvement in code readability","Recognition in C++ community","Active open source maintenance"],link:"https://github.com/TheMR-777/mr_crypt",isFlagship:!0,isOpenSource:!0,roleOpenSource:"Creator & Principal Engineer"},costaz:{id:"costaz",title:"Costaz Desktop",tech:["Flutter","Google Sheets API","Firebase","Excel Export"],summary:"Decentralized academic management system reducing manual data entry by 50%, built as a final year project.",description:"Built for University of the Punjab after surveying 10+ professors. Solved record management pain points with offline-first design and Google integration.",category:"Academic • FYP",challenge:"Professors struggled with fragmented record-keeping. Unreliable connectivity made cloud-only solutions impractical.",approach:"Designed offline-first architecture using Google accounts for decentralized auth. Integrated Google Sheets for familiar data handling. Excel export for report generation.",impact:["50% reduction in manual data entry","30% improvement in data accuracy","Adopted by multiple departments","Recognition for elegant architecture"],link:"#",isFlagship:!0},schemaflow:{id:"schemaflow",title:"SchemaFlow",tech:["React 19","TypeScript","React Flow","Zustand","Tailwind CSS 4","Framer Motion"],summary:"Visual, interactive query canvases.",description:"Born during the development of my Reporting Engine — I needed a way to let users visually wire up database tables and see live SQL output. What started as a stakeholder demo evolved into a standalone, open-source visual query builder. Paste your DDL, drag tables onto a canvas, connect columns, and watch the SQL write itself. Co-engineered with [hi]Gemini 3.1 Pro[/hi], and one of the projects I feel truly embodies my philosophy: take something genuinely complex [dim]in[/dim], deliver something meaningfully elegant [ac]out[/ac].",category:"Developer Tool • Visualization",origin:"Evolved from an enterprise stakeholder demo into an open-source, pluggable query builder",link:"https://themr-777.github.io/SchemaFlow/",repo:"https://github.com/TheMR-777/SchemaFlow",isPersonalCraft:!0},"schema-weaver":{id:"schema-weaver",title:"Schema Weaver",tech:["Three.js","JavaScript","SQL Parsing"],summary:"Auto-decluttered 3D database maps.",description:"Always struggled to visualize relationships between SQL tables. So I built a tool that takes raw SQL schemas (supports TablePlus exports out of the box), smartly identifies relationships using robust heuristics based on naming conventions and foreign key patterns, and renders an [ac]auto-decluttered 3D visualization[/ac] showing which columns link which tables. A spiritual predecessor to SchemaFlow — where this one reveals structure, that one builds queries.",category:"Developer Tool • Visualization",origin:"Frustration with manual DBML conversion and relationship mapping",link:"https://themr-777.github.io/schema-weaver/",repo:"https://github.com/TheMR-777/schema-weaver",isPersonalCraft:!0,featured:!0},letitgo:{id:"letitgo",title:"LetItGo",tech:["Flutter","Dart","Local Storage","Material Design"],summary:"Minimalist elapsed time observer.",description:"Built a minimalist Android app that saves timestamps and shows elapsed time down to the second — because I wanted a beautiful way to watch time flow. I've saved my birthday, job joining date, graduation, and more. Designed with obsessive attention to UI elegance, it's a tiny app with a lot of heart — and proof that [em]depth can be found in the simplest ideas[/em].",category:"Mobile • Personal",origin:"Wanting a beautiful way to visualize the passage of time",repo:"https://github.com/TheMR-777/just_letitgo",isPersonalCraft:!0,featured:!0},"githubify-md":{id:"githubify-md",title:"GitHubify-MD",tech:["Python","Rich TUI","Markdown","GitHub CSS"],summary:"TUI for MD-to-HTML conversion.",description:"Converting Markdown to GitHub-styled HTML was always a pain — VS Code plugins existed but their CSS would break. Built a rich TUI application that converts .md files to pixel-perfect GitHub-flavored HTML with extensive customization, minimal interactions, and full CLI argument support for one-liner conversions.",category:"Developer Tool • CLI",origin:"Broken CSS in existing VS Code Markdown export plugins",repo:"https://github.com/TheMR-777/githubify-md",isPersonalCraft:!0,featured:!0},"moire-effect":{id:"moire-effect",title:"Moiré Effect Demo",tech:["HTML/CSS/JS","Canvas","Gemini 3","Claude Opus 4.5"],summary:"Interactive optical interference demo.",description:"Spotted a mesmerizing pattern on a van's metal door during a ride home and couldn't rest until I understood it. Turned out to be the Moiré effect — an optical interference phenomenon. Built an interactive demo to develop the kind of [ac]intuitive understanding[/ac] I chase in all my physics explorations — and it fascinated not just me, but friends and colleagues alike.",category:"Physics • Visualization",origin:"Curiosity from observing a real-world physics phenomenon",link:"https://themr-777.github.io/moire-effect-demo/",repo:"https://github.com/TheMR-777/moire-effect-demo",isPersonalCraft:!0},"smart-cleanup":{id:"smart-cleanup",title:"Simple Smart Cleanup",tech:["Python","OS APIs","Configuration"],summary:"Configurable automated system maintenance.",description:"A simple Python program I've maintained for a while — it scans and cleans specific directories on my system regularly. Configurable and extensible, users can add their own target locations. It's simple, genuinely simple, but has proven remarkably useful. Shared it because good tools deserve to be shared, no matter how small.",category:"Utility • Automation",origin:"Personal need for systematic, repeatable system maintenance",repo:"https://github.com/TheMR-777/simple-smart-cleanup.py",isPersonalCraft:!0},myportfolio:{id:"myportfolio",title:"MyPortfolio",tech:["React 19","TypeScript","Tailwind CSS 4","Framer Motion","Vite"],summary:"Living testament to Discipline of Restraint.",description:"The portfolio you're reading right now. Engineered from scratch with a Fluent UI 2 / WinUI 3 / Acrylic-Mica-Frosty design language — every translucent layer, every accent glow, every quiet zone oring Suite achieving [ac]200% productivity boost[/ac] with [hi]zero defects[/hi] at launch, and a comprehensive ERP platform.",description:"Progressed from UI/UX to leading core platform modules and multi-tenant migration decisions. My focus: building [hi]reusable primitives[/hi] that power every business module. The same philosophy that drives my personal projects (tools that [ac]transform[/ac]) shaped how I approached enterprise infrastructure.",highlights:["Architected Employee Monitoring Suite solo — zero defects at launch","Engineered Evolver: chromium-inspired cross-platform auto-update engine","Designed 'ACE Password Vault' with multi-layered cryptography","Led ERP Platform Engineering: Rules, Approvals, Rights, Notifications","Built unbreakable Background Jobs Framework — adopted company-wide","Engineered pluggable Logging Framework for in-depth observability","Built Unified Reporting Engine in Python — became ACE's reporting standard","Integrated Mastercard, HBL, and PNB payment services","Received direct commendation from CTO for architectural innovations"],impact:["200% productivity increase via Employee Monitoring Suite","35% reduction in unauthorized breaks","5+ major modules standardized on new platform","Multi-tenant architecture enabling SaaS transformation"],tech:[".NET 9","Blazor","Angular","GraphQL","SignalR","PostgreSQL","C++"],associatedProjectIds:["ems","evolver","erp-core","erp-modules","ace-vault","external-partner-integrations","real-time-infrastructure","background-jobs-framework","logging-framework","reporting-engine"]},mimos:{id:"mimos",company:"MIMOS Berhad (Malaysia)",role:"Lead Developer & System Architect",period:"Dec 2024 — Jul 2025",location:"Remote",featured:!0,summary:"Built sophisticated UWB Indoor Positioning Simulation System as a [hi]solo project[/hi], eliminating the need for [ac]costly physical testing[/ac].",description:"[ac]Pioneered[/ac] accurate indoor positioning simulation without physical hardware. Developed proprietary algorithms for signal propagation and created multi-layered visualization systems.",highlights:["First-principles simulation without physical hardware","Real-time heatmap visualization with NumPy/SciPy","Material-specific signal attenuation modeling","Received exceptional praise for accuracy and attention to detail"],modules:[{name:"Simulation Engine",description:"C# 13 and .NET 9 core modeling signal attenuation, reflection, and geometric constraints with high precision.",impact:"Matched physical test results within 5% margin"},{name:"Signal Processing Pipeline",description:"Python 3.13 modules using NumPy/SciPy for computational geometry and heatmap generation.",impact:"Real-time updates for large floorplans"},{name:"Visualization Layer",description:"WPF interface integrating Matplotlib for coverage analysis. Interactive anchor placement and optimization.",impact:"Intuitive UI praised by client"}],impact:["Eliminated need for initial physical site surveys","Compressed deployment timeline from months to days","Enabled 'perfect' theoretical anchor placement before installation"],tech:["C# 13",".NET 9","Python 3.13","NumPy","SciPy","WPF","Matplotlib"]},teqholic:{id:"teqholic",company:"TeqHolic",role:"Flutter Development Intern",period:"2023 (3 Months)",location:"Jhelum, Pakistan",summary:"Developed cross-platform mobile applications including social media and e-commerce platforms with real-time capabilities.",description:"Gained practical industry experience in agile development, focusing on responsive UI architectures and performance optimization for low-bandwidth environments.",highlights:["Built Chirp: Twitter-like app with real-time updates","Developed Sara Kuch: E-commerce with Shopify integration","Optimized for low-bandwidth environments"],modules:[{name:"Chirp",description:"Social media application with real-time feeds, interactions, and notifications using Firebase.",impact:"Full MVP in 6 weeks"},{name:"Sara Kuch",description:"E-commerce platform integrating Shopify REST API with cart, checkout, and order tracking.",impact:"Complete e-commerce flow delivered"}],impact:["Delivered two full MVP applications in 3 months","Established responsive UI patterns for future projects"],tech:["Flutter","Dart","Firebase","Shopify API","Provider"]}},rT={name:"Muhammad Ammar Khan",role:"Software Architect & Security Engineer",location:"Jhelum, Punjab, Pakistan",email:"m.shahzad.ms72@gmail.com",phone:"+92 314 5401405",dob:"April 1, 2001",nationality:"Pakistani",profileImage:"https://i.ibb.co/2Y8YWR1X/freepik-br-2a5d6513-6583-40a5-8ab6-1a77d56608c6.png",taglines:["Creating What Hasn't Been Built Before","Software Architect & Security Engineer","C++ Expert & Cryptography Specialist","AI-Powered Innovation Engineer"],about:"A lifelong journey of innovation and engineering excellence, from age 3 to industry architect. I blend low-level mastery (C++, Cryptography) with high-level architecture (.NET, AI) to engineer solutions that haven't been built before — from enterprise platforms to open-source tools that transform how developers work.",social:{github:"https://github.com/TheMR-777",linkedin:"https://www.linkedin.com/in/777-ammar",website:"https://TheMR-777.github.io/",whatsapp:"https://wa.me/923145401405",nullbyte:"https://creator.wonderhowto.com/h4ck3r_777/"},stats:{experience:"6+ Years",productivity:"200%",cgpa:"3.73"},languages:{urdu:"Native",english:"IELTS 7.5"},interests:[{name:"Astronomy",description:"Second-largest passion after computing. I study the cosmos through expert voices to build [ac]intuition[/ac]—not rote facts—about black holes, stellar evolution, and cosmic structure."},{name:"Physics",description:"A late-blooming love that became a core lens. I build intuitive models about electromagnetism, chip fabrication, GPUs, and hardware architectures through [hi]thoughtful exploration[/hi]."},{name:"Psychology",description:"Nurtured by my psychologist mother's open conversations. I study cognitive biases and learning science — because [em]understanding how the mind learns is the most valuable thing I have learned[/em]."}]},lT={title:"The Driving Force",subtitle:"The Joy of Discovery",mainQuote:"The scale of the goal has [hi]never[/hi] mattered to me—what matters is the [ac]journey[/ac] of getting there.",cardText:`Whether I'm architecting a comprehensive system like the [c=text-text-primary font-medium]Employee Monitoring Suite[/c], or spending hours refining something as "simple" as a prime number generation algorithm, the experience is the same: an [ac]insatiable curiosity[/ac] that drives me to discover one more micro-optimization, one more elegant simplification, one more insight I hadn't seen before.`,sections:[{title:"The Journey Over the Goal",content:"Whether architecting a comprehensive system or spending hours refining a Fibonacci sequence, the experience is the same: an insatiable curiosity that drives me to discover one more micro-optimization, one more elegant simplification.",highlight:"The destination is just a waypoint—the real reward is the infinite richness of the journey itself."},{title:"The Beauty in Fundamentals",content:'I vividly remember iterating on fundamental algorithms for far longer than anyone would consider "reasonable"—not because I had to, but because each iteration revealed something new. A zero-branch Fibonacci by seeding with −1 and 1. A sieve optimization that shaved microseconds.',highlight:"These aren't just technical wins; they're discoveries.",discovery:{title:"Rediscovering Horner's Method",story:"During university, frustrated with the heavy calculations of binary-to-decimal conversion (even with shortcuts), I experimented and found my own technique: start from the leftmost 1, move right — multiply the result by 2, add the next digit. Repeat until the end. Years later, I learned I had independently discovered Horner's Method of base conversion — a moment that validated my trust in mathematical intuition."}},{title:"Succeeding Within the Failures",content:"Sometimes the original goal remains out of reach—but along the way, I stumble upon something profound. A technique. An insight. A connection I hadn't anticipated.",highlight:"Failure isn't an endpoint—it's a checkpoint where unexpected treasures reveal themselves.",phasedDiscovery:{title:"The Granite 2000000 Incident",period:"July 2022 · Summer Holidays",phases:[{label:"The Blackout",content:'After three years away from gaming, I was deep into Far Cry 6 and genuinely enjoying it again. Then, mid-autosave, electricity went out. On reboot, the game showed "Error: Granite 2000000." Months of progress looked gone, and no real fix existed online.'},{label:"The Discovery",content:"Using my data recovery instincts, I inspected the save files. One autosave had the right size but only null bytes. Then I noticed each file had a numbered counterpart (_01 / _02). The counterpart had real data. I replaced the corrupted file with it and loaded the game from the exact interrupted moment."},{label:"The Ripple",content:"I validated the method repeatedly, then compressed the fix into a 40-second YouTube tutorial. It spread quickly across forums and helped players in Far Cry 5, New Dawn, and Far Cry 4 too. I still receive appreciation comments today."}],link:"https://www.youtube.com/watch?v=cPH_SZKI_Cg"}},{title:"Beyond Computer Science",content:"This philosophy extends far beyond computing. It applies to Mathematics, where a proof's elegance can be refined endlessly. It applies to Physics, where understanding one concept unlocks intuition for a dozen others. It applies to every domain where depth is possible—and depth is always possible.",highlight:"Computer Science is only one language of discovery; every domain is a fractal, where curiosity reveals that there is no bottom—only deeper truth and beauty."},{title:"The Discipline of Restraint",content:"Design and formatting should be like seasoning — [hi]precise application[/hi] enhances, but over-application ruins. Silence is as important as sound. Quiet zones give the eye a resting point, allowing the accents to speak. I believe in highlighting the [ac]core essence[/ac] and letting the surrounding structure remain elegantly plain. This portfolio itself is a living testament — every accent, every highlight, every silent plain-text zone was a [em]deliberate design choice[/em].",highlight:"If everything is accented, nothing is. True sophistication lies in what you choose not to highlight."},{title:"Learning How to Learn",content:"Along the way of my life, I learned something most people never do — how to actually learn. Not to remember, not to follow footsteps, but to build connections. To relate a new concept to something I already know, and integrate it so deeply into my intuition that it becomes part of how I think. That is the real skill — and it compounds across every domain I touch.",highlight:"Not learning to remember — learning to learn.",metaSkill:{title:"The Ultimate Mindset",story:"That is where I am heading — toward a mindset that strives for perfection and accuracy. Every realm I explore — Astronomy, Physics, Psychology — is not random curiosity. Each one builds pathways that make me sharper in every other."}}],principles:[{icon:"compass",title:"Beyond the Recipe",description:"I don't accept surface answers. I challenge existing implementations and build connections between ideas — until knowledge becomes intuition."},{icon:"layers",title:"Precision",description:"True mastery shows in removing what doesn't belong. I cut complexity and spot inefficiencies — small changes, disproportionate gains."},{icon:"lightbulb",title:"Adaptability",description:"Each problem deserves a solution tailored to its unique constraints, not forced generic templates."},{icon:"sparkles",title:"Evolution",description:"Making things genuinely better, not just different. Refining until the result feels inevitable."}],toolsPhilosophy:{title:"Tools That Transform",subtitle:"The distinction between storing information and creating value",content:"Most software exists to [hi]remember[/hi] — to store records, log transactions, and keep notes organized. Important work, but not what ignites my passion.",essence:"What excites me is building software that takes something [c=text-text-secondary]in[/c], and gives something [ac]genuinely new[/ac] back. Software that [ac]transforms[/ac].",examples:"Every personal project I build follows this principle. SchemaFlow transforms raw SQL DDLs into visual, interactive query canvases. Schema Weaver untangles database relationships into auto-decluttered 3D maps. The Moiré Effect Demo turns a real-world physics observation into interactive understanding. GitHubify-MD eliminates hours of broken Markdown-to-HTML conversion. Even Simple Smart Cleanup automates tedious system maintenance I'd otherwise do by hand. These are small, sometimes simple — but each one takes something in and produces something of real, tangible value.",closing:"This is the kind of engineering that matters to me: building things that actually do something. Tools that process, transform, and create — not just remember.",grid:[{verb:"Reveal",icon:"◐",description:"Making the invisible visible — uncovering hidden patterns"},{verb:"Simplify",icon:"◇",description:"Reducing complexity to clarity — distilling essence"},{verb:"Automate",icon:"↻",description:"Freeing humans from repetitive, mundane work"},{verb:"Connect",icon:"⬡",description:"Bridging isolated systems — creating synergy"},{verb:"Simulate",icon:"◈",description:"Replacing costly trials with digital insight"},{verb:"Empower",icon:"△",description:"Enabling capabilities that didn't exist before"}],mantra:{input:"Input",transformation:"Transformation",output:"Value"},closingThought:"Software worth building leaves the world different than it found it."},architecturalPhilosophy:{content:"I don't just [hi]memorize[/hi] patterns—I understand them at their core: [c=text-accent]what problem[/c] each pattern solves, [c=text-accent]how[/c] it solves it, and [c=text-accent]where it falls short[/c].",revealText1:"Patterns are the surface. Understanding is what lies beneath.",revealText2:"I don't just build systems — I build the intuition that builds systems.",revealText3:"[ac]Learn how to learn,[/ac] and everything else follows."},closingQuote:`"[i]Creating what hasn't been built before,[/i]<br/>[em]one innovation at a time.[/em]"`,coreInsight:"This is my innermost driving force. I don't pursue projects for the end result alone; I pursue them for what I'll discover along the way. It's why I can spend weeks on something others finish in hours, and why the 'simplest' problems often teach me the most."},oT={genesis:{title:"The Genesis",period:"Age 3-10",description:"My journey began at age 3, shaped by my uncle's computer. What started with GTA Vice City and SEGA wasn't just entertainment — it planted the seed of an [ac]insatiable curiosity[/ac] about how systems work. When gifted a Windows XP PC, limited access became my greatest teacher: I learned to [hi]troubleshoot[/hi], [hi]experiment[/hi], and [hi]discover independently[/hi] — a pattern that would define everything I build today."},awakening:{title:"The Awakening",period:"Teenage Years",description:"Watching 'Inkeshaaf' on 24 News ignited my passion for [ac]ethical hacking[/ac]. I set an 'impossible' goal: hack an Android from another Android. Over a year, I learned Linux, Python, and networking from first principles — pioneering [hi]mobile-to-mobile penetration testing[/hi]. That work became the 2nd most-read Null Byte article (2018-2020) and led me to found a cybersecurity community across 6 countries. The security mindset I built here later shaped every system I've secured since."},academic:{title:"Academic Excellence",period:"2019-2023",description:"At University of the Punjab, I earned a [ac]3.73 CGPA[/ac] while pursuing depth far beyond the curriculum — implementing every data structure and algorithm in [hi]modern C++[/hi] a full year before coursework, because [em]understanding beats memorization[/em]. Became an unofficial C++ teaching assistant in my second semester, collaborated with a visiting PhD professor on quantum computing simulations, and was the first team to complete both FYP and research papers simultaneously."},professional:{title:"Professional Evolution",period:"2023-Present",description:"My industry entry was strategic: a TeqHolic Flutter internship, a leveraged Rev9 AI team offer, and a direct CTO selection at ACE Money Transfer. Now as .NET Developer & Architecture Consultant, I've channeled every skill — from low-level C++ and cryptography to polyglot system design — into enterprise-grade products. The defining achievement: devoting an entire year to the [c=text-text-primary font-medium]Employee Monitoring Suite[/c], a system I consider a [ac]professional masterpiece[/ac] and a crucible for every engineering principle I hold."}},cT={languages:[{name:"C++",level:"Expert",years:"6+",tags:["Modern C++23/26","Template Metaprogramming"],extraTags:["STL","SFINAE & Concepts","Lock-free Programming","Memory Management","RAII","Move Semantics"]},{name:"C# / .NET",level:"Advanced",years:"3+",tags:[".NET 9","LINQ","Async/Await"],extraTags:["Blazor","EF Core","Source Generators","Minimal APIs","SignalR"]},{name:"Python",level:"Intermediate",years:"5+",tags:["Scientific Computing","Automation","ML"],extraTags:["NumPy","SciPy","Matplotlib","Rich TUI","Scripting"]},{name:"TypeScript",level:"Intermediate",years:"2+",tags:["Angular","Node.js","ES6+"],extraTags:["Type Safety","Generics","RxJS","PrimeNG"]},{name:"SQL",level:"Advanced",years:"4+",tags:["Complex Queries","Optimization"],extraTags:["PostgreSQL","Stored Procedures","Indexing","Query Planning"]},{name:"Dart",level:"Proficient",years:"3+",tags:["Flutter","State Management"],extraTags:["Provider","Riverpod","Material Design","Responsive UI"]},{name:"MATLAB",level:"Intermediate",years:"2+",tags:["Signal Processing","Simu
